<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyHomeTab</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet" />
</head>
<body>
  <!-- Canvas 粒子背景 -->
  <canvas id="bgCanvas"></canvas>

  <main class="container">
    <!-- 书签网格 -->
    <section class="bookmarks-section">
      <div id="bookmarksGrid" class="bookmarks-grid"></div>
    </section>

    <!-- 添加书签（折叠） -->
    <div class="add-section">
      <button class="add-toggle" id="toggleAddBtn">
        <i class="fas fa-plus" id="toggleIcon"></i>
        <span>添加书签</span>
      </button>
      <div class="add-panel" id="addPanel">
        <div class="add-form">
          <input type="text" id="newBookmarkName" placeholder="名称" maxlength="30" autocomplete="off" />
          <input type="text" id="newBookmarkUrl" placeholder="网址" autocomplete="off" />
          <button class="add-btn" id="addBookmarkBtn"><i class="fas fa-plus"></i> 添加</button>
        </div>
      </div>
    </div>
    <!-- 页脚已移除 -->
  </main>

  <script src="script.js"></script>
</body>
</html>
